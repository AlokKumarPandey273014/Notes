<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Love Story ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 90%;
    max-width: 500px;
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    text-align: center;
    transition: 0.3s;
}

h2 {
    color: #ff4d6d;
}

.shayari {
    font-size: 14px;
    color: #777;
    margin-bottom: 10px;
    font-style: italic;
}

textarea {
    width: 100%;
    height: 90px;
    border-radius: 10px;
    border: 1px solid #ccc;
    padding: 10px;
    resize: none;
}

.buttons {
    margin-top: 15px;
}

button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    background: #ff4d6d;
    color: white;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.progress {
    height: 6px;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 15px;
}

.progress-bar {
    height: 100%;
    background: #ff4d6d;
    width: 0%;
    transition: 0.3s;
}

#final {
    display: none;
}
</style>

</head>

<body>

<div class="container">

<div class="progress">
    <div class="progress-bar" id="bar"></div>
</div>

<h2 id="question"></h2>
<div class="shayari" id="shayari"></div>
<textarea id="answer" placeholder="Write here ❤️"></textarea>

<div class="buttons">
    <button onclick="prev()">Back</button>
    <button onclick="next()">Next</button>
</div>

<div id="final">
    <h2>❤️ Thank You My Love ❤️</h2>
    <p>
        Tumne sab answers likhe…<br>
        par mera answer sirf ek hai —<br><br>
        <b>I Love You Forever 💖</b>
    </p>
    <button onclick="download()">Download Answers 💾</button>
</div>

</div>

<script>
let current = 0;

let questions = [
"Tum mujhe sabse zyada kab miss karti ho?",
"Hamari sabse pyari memory kaunsi hai?",
"Meri kaunsi baat tumhe sabse zyada pasand hai?",
"Jab hum milte hain to tumhe kaisa feel hota hai?",
"Agar main paas hota abhi, to kya karti?",
"Tumhare liye main kya hoon?",
"Hamara future tum kaise imagine karti ho?",
"Kya kabhi meri yaad me royi ho?",
"Meri kaunsi baat tumhe sabse special lagti hai?",
"Mere liye ek message likho ❤️"
];

let shayari = [
"Door rehkar bhi dil ke kareeb ho tum…",
"Waqt ruk jata hai un lamhon me…",
"Teri har aadat se mohabbat ho gayi…",
"Tujhe dekhte hi sab bhool jata hoon…",
"Kaash tu paas hota iss pal me…",
"Tu hi meri zindagi, tu hi meri jaan…",
"Har kal me bas tera hi haath chahiye…",
"Aansu bhi muskurane lagte hain…",
"Teri choti choti baatein bhi khaas lagti hain…",
"Tu ehsaas hai mera…"
];

let answers = [];

function loadQuestion() {
    document.getElementById("question").innerText = questions[current];
    document.getElementById("shayari").innerText = shayari[current];
    document.getElementById("answer").value = answers[current] || "";

    let progress = ((current + 1) / questions.length) * 100;
    document.getElementById("bar").style.width = progress + "%";
}

function next() {
    answers[current] = document.getElementById("answer").value;

    if (current < questions.length - 1) {
        current++;
        loadQuestion();
    } else {
        showFinal();
    }
}

function prev() {
    if (current > 0) {
        current--;
        loadQuestion();
    }
}

function showFinal() {
    document.getElementById("question").style.display = "none";
    document.getElementById("shayari").style.display = "none";
    document.getElementById("answer").style.display = "none";
    document.querySelector(".buttons").style.display = "none";
    document.getElementById("final").style.display = "block";
}

function download() {
    let data = JSON.stringify(answers, null, 2);
    let blob = new Blob([data], { type: "application/json" });

    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "love_answers.json";
    a.click();
}

loadQuestion();
</script>

</body>
</html>
