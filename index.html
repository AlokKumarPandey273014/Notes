<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Love Story ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
  background: linear-gradient(135deg, #ff9a9e, #fecfef);
    overflow: hidden;
}

/* container center */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 500px;
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    text-align: center;
    z-index: 2;
}

/* question */
#question {
    color: #ff2e63;
    font-size: 20px;
    margin-bottom: 10px;
}

/* shayari */
.shayari {
    font-weight: bold;
    color: #444;
    margin-bottom: 10px;
    white-space: pre-line;
}

/* textarea */
textarea {
    width: 100%;
    height: 100px;
    border-radius: 10px;
    padding: 10px;
    border: 1px solid #ccc;
}

/* buttons */
button {
    padding: 10px 20px;
    margin: 5px;
    background: #ff4d6d;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* progress */
.progress {
    height: 6px;
    background: #eee;
    border-radius: 10px;
    margin-bottom: 15px;
}
.progress-bar {
    height: 100%;
    background: #ff4d6d;
    width: 0%;
}

/* floating hearts */
.heart {
    position: absolute;
    color: rgba(255,255,255,0.7);
    font-size: 20px;
    animation: float 6s linear infinite;
}
@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

#final { display: none; }
</style>

</head>

<body>

<div class="container">

<div class="progress">
    <div class="progress-bar" id="bar"></div>
</div>

<h2 id="question"></h2>
<div class="shayari" id="shayari"></div>

<textarea id="answer" placeholder="
💌 Dil se likho...
💖 Tumhari feelings important hain..."></textarea>

<br>

<button onclick="prev()">Back</button> <button onclick="next()">Next ❤️</button>

<div id="final">
    <h2>❤️ Thank You My Love ❤️</h2>
    <p><b>I Love You Forever 💖</b></p>
    <button onclick="download()">Download 💾</button>
</div>

</div>

<script>
let current = 0;

let questions = [
"Tum mujhe sabse zyada kab miss karti ho?",
"Hamari sabse pyari memory kaunsi hai?",
"Meri kaunsi baat tumhe sabse zyada pasand hai?",
"Jab hum milte hain to tumhe kaisa feel hota hai?",
"Agar main paas hota abhi, to kya karti?",
"Tumhare liye main kya hoon?",
"Hamara future tum kaise imagine karti ho?",
"Kya kabhi meri yaad me royi ho?",
"Meri kaunsi baat tumhe sabse special lagti hai?",
"Mere liye ek message likho ❤️"
];

let shayari = [
"Door rehkar bhi dil ke kareeb ho tum,\nHar pal mere khayalon me base ho tum,\nFaasle chahe jitne bhi ho jaaye,\nMere dil ke sabse paas ho tum ❤️",

"Waqt ruk jata hai un lamhon me,\nJahan sirf tu aur main hote hain,\nHar yaad me bas tera hi chehra,\nAur wo pal hamesha zinda rehte hain 💖",

"Teri har aadat se mohabbat ho gayi,\nTeri har baat se ibadat ho gayi,\nNa jaane kaise hua ye sab,\nTu meri zindagi ki zarurat ho gayi ❤️",

"Tujhe dekhte hi sab bhool jata hoon,\nJaise har gham door ho jata hoon,\nTeri muskaan me hi meri duniya,\nTujh me hi khud ko paata hoon 💞",

"Kaash tu paas hota iss pal me,\nTo duniya ruk jaati ek pal me,\nBas tujhe dekhte rehte hum,\nAur kho jaate uss kal me ❤️",

"Tu hi meri zindagi, tu hi meri jaan,\nTere bina sab kuch lagta suna sa samaan,\nHar dhadkan me tera hi naam,\nTu hi meri duniya, tu hi meri pehchaan 💓",

"Har kal me bas tera hi haath chahiye,\nZindagi bhar tera saath chahiye,\nNa kuch aur chahiye mujhe,\nBas tu aur tera pyar chahiye ❤️",

"Aansu bhi muskurane lagte hain,\nJab tera naam yaad aata hai,\nDard bhi meetha lagta hai,\nJab tu dil me samata hai 💧❤️",

"Teri choti choti baatein bhi khaas lagti hain,\nTeri har aadat meri jaan lagti hai,\nNa jaane kya jaadu hai tujh me,\nTu har pal mere paas lagti hai 💖",

"Alfaaz kam pad jaate hain,\nTujhe bayan karne ke liye,\nTu ehsaas hai mera,\nHar lafz se upar hai ❤️"
];

let answers = [];

function loadQuestion() {
    document.getElementById("question").innerText = questions[current];
    document.getElementById("shayari").innerText = shayari[current];
    document.getElementById("answer").value = answers[current] || "";

    document.getElementById("bar").style.width =
        ((current + 1) / questions.length) * 100 + "%";
}

function next() {
    let ans = document.getElementById("answer").value;
    let lines = ans.trim().split("\n").filter(l => l.trim() !== "");

    if (lines.length < 3) {
        alert("💖 Dear 3 se 4 likho...\nकम से कम 3-4 lines chahiye 😘");
        return;
    }

    answers[current] = ans;

    if (current < questions.length - 1) {
        current++;
        loadQuestion();
    } else {
        showFinal();
    }
}

function prev() {
    if (current > 0) {
        current--;
        loadQuestion();
    }
}

function showFinal() {
    document.getElementById("question").style.display = "none";
    document.getElementById("shayari").style.display = "none";
    document.getElementById("answer").style.display = "none";
    document.querySelectorAll("button")[0].style.display = "none";
    document.querySelectorAll("button")[1].style.display = "none";
    document.getElementById("final").style.display = "block";
}

function download() {
    let blob = new Blob([JSON.stringify(answers, null, 2)], { type: "application/json" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "love_answers.json";
    a.click();
}

/* floating hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 300);

loadQuestion();
</script>

</body>
</html>
