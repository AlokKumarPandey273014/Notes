<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Love Story ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    overflow: hidden;
}

/* Floating Hearts */
.heart {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
    opacity: 0.7;
}

@keyframes floatUp {
    0% { transform: translateY(0); }
    100% { transform: translateY(-110vh); }
}

.container {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 500px;
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 25px;
    margin: 40px auto;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    text-align: center;
}

h2 {
    color: #ff4d6d;
}

.shayari {
    font-size: 15px;
    color: #444;
    margin-bottom: 12px;
    font-weight: bold;
    line-height: 1.6;
}

textarea {
    width: 100%;
    height: 90px;
    border-radius: 10px;
    border: 1px solid #ccc;
    padding: 10px;
    resize: none;
}

button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    background: #ff4d6d;
    color: white;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.progress {
    height: 6px;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 15px;
}

.progress-bar {
    height: 100%;
    background: #ff4d6d;
    width: 0%;
    transition: 0.3s;
}

#final {
    display: none;
}
</style>

</head>

<body>

<div class="container">

<div class="progress">
    <div class="progress-bar" id="bar"></div>
</div>

<h2 id="question"></h2>
<div class="shayari" id="shayari"></div>
<textarea id="answer" placeholder="Write your feelings ❤️"></textarea>

<div>
    <button onclick="prev()">Back</button>
    <button onclick="next()">Next</button>
</div>

<div id="final">
    <h2>❤️ Thank You My Love ❤️</h2>
    <p>
        Tumne har sawal ka jawab diya...<br><br>
        Mera har jawab bas tum ho 💖<br><br>
        <b>I Love You Forever ❤️</b>
    </p>
    <button onclick="download()">Download 💾</button>
</div>

</div>

<script>
let current = 0;

let questions = [
"Tum mujhe sabse zyada kab miss karti ho ,Dear?",
"Hamari sabse pyari memory kaunsi hai ,Dear?",
"Meri kaunsi baat tumhe sabse zyada pasand hai ,Dear?",
"Jab hum milte hain to tumhe kaisa feel hota hai,Dear ?",
"Agar main paas hota abhi, to kya karti ,Dear?",
"Tumhare liye main kya hoon ,Dear ?",
"Hamara future tum kaise imagine karti ho ,Dear ?",
"Kya kabhi meri yaad me royi ho ,Dear ?",
"Meri kaunsi baat tumhe sabse special lagti hai ,Dear ?",
"Mere liye ek message likho ❤️"
];

let shayari = [
"Door rehkar bhi dil ke kareeb ho tum... \nHar dhadkan me bas tera hi naam hai... \nTujhse hi meri duniya roshan hai... \nTu hi meri subah aur shaam hai ❤️",
"Waqt ruk jata hai un lamhon me... \nJahan sirf tu aur main hote hain... \nHar yaad me bas tera hi chehra hai... \nAur wo pal sabse khoobsurat hote hain 💖",
"Teri har aadat se mohabbat ho gayi... \nTeri har baat me sukoon milta hai... \nTu paas ho ya door... \nMujhe har pal tera ehsaas hota hai ❤️",
"Tujhe dekhte hi sab bhool jata hoon... \nJaise duniya wahi ruk jati hai... \nBas tu aur main reh jate hain... \nAur wo pal hamesha ke liye khaas ban jata hai 💕",
"Kaash tu paas hota iss pal me... \nTo waqt ko wahi rok leta... \nTeri baahon me sukoon milta... \nAur duniya ko bhool jata ❤️",
"Tu hi meri zindagi hai... \nTu hi meri har khushi hai... \nTere bina sab adhura hai... \nTu hi meri poori duniya hai 💖",
"Har kal me bas tera hi saath chahiye... \nHar sapne me tera hi haath chahiye... \nZindagi ke har mod pe... \nMujhe sirf tera hi saath chahiye ❤️",
"Aansu bhi muskurane lagte hain... \nJab tera naam aata hai... \nTeri yaadon me bhi sukoon milta hai... \nTu hi meri sabse pyari aadat hai 💕",
"Teri choti choti baatein bhi khaas lagti hain... \nTera har andaaz dil ko choo jata hai... \nTu bas tu hai... \nAur wahi sabse special hai ❤️",
"Alfaaz kam pad jate hain... \nTujhe bayan karne me... \nTu ehsaas hai mera... \nJo har lafz se upar hai 💖"
];

let answers = [];

function loadQuestion() {
    document.getElementById("question").innerText = questions[current];
    document.getElementById("shayari").innerText = shayari[current];
    document.getElementById("answer").value = answers[current] || "";

    let progress = ((current + 1) / questions.length) * 100;
    document.getElementById("bar").style.width = progress + "%";
}

function next() {
    answers[current] = document.getElementById("answer").value;

    if (current < questions.length - 1) {
        current++;
        loadQuestion();
    } else {
        showFinal();
    }
}

function prev() {
    if (current > 0) {
        current--;
        loadQuestion();
    }
}

function showFinal() {
    document.getElementById("question").style.display = "none";
    document.getElementById("shayari").style.display = "none";
    document.getElementById("answer").style.display = "none";
    document.querySelector("button").style.display = "none";
    document.getElementById("final").style.display = "block";
}

function download() {
    let data = JSON.stringify(answers, null, 2);
    let blob = new Blob([data], { type: "application/json" });

    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "love_answers.json";
    a.click();
}

/* Floating hearts generator */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 300);

loadQuestion();
</script>

</body>
</html>
